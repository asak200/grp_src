controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

    pwm_command_controller:
      type: forward_command_controller/ForwardCommandController

pwm_command_controller:
  ros__parameters:
    # List the exact joints and command interfaces defined in your URDF/Xacro
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
    interface_name: pwm
